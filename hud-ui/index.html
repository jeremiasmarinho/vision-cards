<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>HUD - Baralho Vivo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #050816;
        color: #f9fafb;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .hud-container {
        background: radial-gradient(circle at top left, #1f2937, #020617);
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.4);
        box-shadow: 0 18px 60px rgba(15, 23, 42, 0.9);
        padding: 20px 24px;
        width: min(480px, 100%);
      }

      .hud-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 16px;
      }

      .hud-title {
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #e5e7eb;
      }

      .hud-subtitle {
        font-size: 0.8rem;
        color: #9ca3af;
      }

      .deck-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        font-size: 0.8rem;
        color: #9ca3af;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        margin-right: 6px;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .status.connected .status-dot {
        background: #22c55e;
        box-shadow: 0 0 12px rgba(34, 197, 94, 0.7);
      }

      .status.disconnected .status-dot {
        background: #ef4444;
        box-shadow: 0 0 8px rgba(239, 68, 68, 0.7);
      }

      .cards-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        max-height: 260px;
        overflow-y: auto;
        padding-right: 4px;
      }

      .card-chip {
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.7);
        font-size: 0.78rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(31, 41, 55, 0.9));
        color: #e5e7eb;
      }

      .empty-state {
        font-size: 0.88rem;
        color: #6b7280;
        text-align: center;
        padding: 18px 0 12px;
      }
    </style>
  </head>
  <body>
    <div class="hud-container">
      <div class="hud-header">
        <div class="hud-title">Baralho Vivo</div>
        <div class="hud-subtitle">Estado compartilhado em tempo real</div>
      </div>

      <div class="deck-meta">
        <div id="connection-status" class="status disconnected">
          <span class="status-dot"></span>
          <span class="status-label">Desconectado</span>
        </div>
        <div>
          Cartas restantes: <span id="deck-count">0</span> / 52
        </div>
      </div>

      <div id="cards-container" class="cards-grid"></div>
      <div id="empty-state" class="empty-state">Aguardando estado do servidor...</div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" integrity="sha384-6BvThI1+wroJgDsQY5KneBC9ZUi1c9V+uSi/TFoiHzpWFmdhEChpLTwydxltICc2" crossorigin="anonymous"></script>
    <script src="./app.js"></script>
  </body>
</html>
